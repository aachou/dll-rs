name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta, nightly]
    runs-on: windows-latest
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: ${{ matrix.toolchain == 'stable' && 'clippy, rustfmt' || '' }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
        if: matrix.toolchain == 'stable'
      - run: cargo clippy -- -D warnings
        if: matrix.toolchain == 'stable'
      - run: cargo build
      - run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: .\target\release\dll.exe --version
      - run: Compress-Archive -Path target\release\dll.exe -DestinationPath dll-windows-x64.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: dll-windows-x64.zip
